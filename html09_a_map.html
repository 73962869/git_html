<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map을 이용한 링크걸기</title>
</head>
<body>
    <h2>이미지의 일부를 이용한 링크걸기</h2>
    <img src="../img/jeju.png" usemap="#imgMap"/>

    <pre>
        map태그 : 특정이미지의 특정부분을 링크걸기 위한 기능을 구현.
                  map태그는 페이지의 마지막에 기술
        area 태그 : map태그내에 링크 수만큼 표기한다
            Shape 속성 : rect(사각형), circle(원), poly(다각형)
            coords 속성 : 좌표
    </pre>
    <map id="imgMap">
        <!--                       x1,y1,x2,y2-->
        <area shape="rect" coords="185,130,270,205" href="https://www.jejuair.net/ko/main/base/index.do" 
        target="_blank" title="제주항공"/>
        <!--                         x, y, r(반지름)-->
        <area shape="circle" coords="480, 290, 60" href="https://www.jeju.go.kr/index.htm" 
        target="_blank" title="한라산"/>
        <!--                       x1,y1,x2,y2,x3,y3,x4,y4,x5,y5-->
        <area shape="poly" coords="90,200,190,270,140,320,70,320,40,250" href="html08_a.html"/>
    </map>
</body>
</html>
